# nixpacks.toml — Instala Chromium para puppeteer en Railway
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "ttf-freefont"
]

[phases.build]
cmds = ["npm install"]

[start]
cmd = "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true PUPPETEER_EXECUTABLE_PATH=$(which chromium) node index.js"
